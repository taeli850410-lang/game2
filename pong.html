<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>PONG - 핑퐁</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;background:#0a0a1a;color:#fff;font-family:'Courier New',monospace;overflow:hidden;user-select:none;}
  #wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;}
  #game{background:#040410;border:3px solid #2a6a6a;box-shadow:0 0 26px rgba(0,255,255,.25);}
  a.back{position:fixed;top:14px;left:14px;color:#6ff;text-decoration:none;font-size:14px;border:1px solid #3aa;padding:6px 12px;border-radius:4px;}
  a.back:hover{background:#1a3a3a;}
  #ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;pointer-events:none;}
  .panel{pointer-events:auto;}
  h1{font-size:46px;letter-spacing:8px;color:#6ff;text-shadow:0 0 12px #0cc;}
  .btn{display:block;width:240px;margin:10px auto;padding:12px;font-family:inherit;font-size:18px;letter-spacing:3px;color:#fff;background:#0a2a2a;border:2px solid #3cc;cursor:pointer;}
  .btn:hover{background:#1a4a4a;transform:scale(1.05);}
  .btn small{display:block;font-size:11px;color:#7dd;margin-top:3px;}
  .hint{margin-top:22px;font-size:13px;color:#789;line-height:1.8;}
  .blink{animation:bl 1s steps(2) infinite;}@keyframes bl{to{visibility:hidden;}}
</style>
</head>
<body>
<a class="back" href="index.html">← 메뉴</a>
<div id="wrap">
  <canvas id="game" width="640" height="420"></canvas>
</div>
<div id="ov"><div class="panel" id="panel"></div></div>
<script>
const cv=document.getElementById('game'),ctx=cv.getContext('2d');
const W=cv.width,H=cv.height;
const ov=document.getElementById('ov'),panel=document.getElementById('panel');
let player,ai,ball,scoreP,scoreA,running=false,cfg;
const WIN=7;
const keys={};
addEventListener('keydown',e=>{keys[e.code]=true;if(['ArrowUp','ArrowDown'].includes(e.code))e.preventDefault();});
addEventListener('keyup',e=>{keys[e.code]=false;});
cv.addEventListener('mousemove',e=>{const r=cv.getBoundingClientRect();player&&(player.y=Math.max(player.h/2,Math.min(H-player.h/2,e.clientY-r.top)));});

function serve(dir){
  ball={x:W/2,y:H/2,r:8,vx:cfg.bspeed*(dir||(Math.random()<.5?1:-1)),vy:(Math.random()*2-1)*3};
}
function start(c){
  cfg=c;scoreP=0;scoreA=0;
  player={x:24,y:H/2,w:12,h:cfg.ph,speed:7};
  ai={x:W-24,y:H/2,w:12,h:cfg.ph,speed:cfg.aispeed};
  serve();ov.style.display='none';running=true;loop();
}
function loop(){
  if(!running)return;
  // 플레이어
  if(keys.ArrowUp)player.y-=player.speed;
  if(keys.ArrowDown)player.y+=player.speed;
  player.y=Math.max(player.h/2,Math.min(H-player.h/2,player.y));
  // AI 추적 (난이도별 반응성)
  const target=ball.y + (ball.vx>0?0:0);
  if(ai.y<target-10)ai.y+=Math.min(ai.speed, target-ai.y);
  else if(ai.y>target+10)ai.y-=Math.min(ai.speed, ai.y-target);
  ai.y=Math.max(ai.h/2,Math.min(H-ai.h/2,ai.y));
  // 공
  ball.x+=ball.vx;ball.y+=ball.vy;
  if(ball.y<ball.r){ball.y=ball.r;ball.vy*=-1;beep(330,0.03);}
  if(ball.y>H-ball.r){ball.y=H-ball.r;ball.vy*=-1;beep(330,0.03);}
  // 패들 충돌
  hitPaddle(player,1);
  hitPaddle(ai,-1);
  // 득점
  if(ball.x<-20){scoreA++;score();serve(1);}
  if(ball.x>W+20){scoreP++;score();serve(-1);}
  draw();
  requestAnimationFrame(loop);
}
function hitPaddle(p,dir){
  if(((dir>0&&ball.vx<0)||(dir<0&&ball.vx>0)) &&
     ball.x-ball.r<p.x+p.w/2 && ball.x+ball.r>p.x-p.w/2 &&
     Math.abs(ball.y-p.y)<p.h/2+ball.r){
    const hit=(ball.y-p.y)/(p.h/2);
    const sp=Math.min(Math.hypot(ball.vx,ball.vy)*1.05, 13);
    const ang=hit*(Math.PI/3.2);
    ball.vx=dir*Math.cos(ang)*sp;
    ball.vy=Math.sin(ang)*sp;
    ball.x=p.x+dir*(p.w/2+ball.r);
    beep(550,0.04);
  }
}
function score(){
  beep(180,0.2,'sawtooth');
  if(scoreP>=WIN||scoreA>=WIN)return end();
}
function draw(){
  ctx.fillStyle='#040410';ctx.fillRect(0,0,W,H);
  // 중앙선
  ctx.strokeStyle='rgba(0,255,255,.2)';ctx.setLineDash([8,12]);ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();ctx.setLineDash([]);
  // 점수
  ctx.fillStyle='rgba(0,255,255,.5)';ctx.font='48px Courier New';ctx.textAlign='center';
  ctx.fillText(scoreP,W/2-60,60);ctx.fillText(scoreA,W/2+60,60);
  ctx.fillStyle='#6ff';ctx.font='12px Courier New';
  ctx.fillText('YOU',W/2-60,78);ctx.fillText('CPU',W/2+60,78);
  // 패들
  ctx.fillStyle='#6ff';ctx.fillRect(player.x-player.w/2,player.y-player.h/2,player.w,player.h);
  ctx.fillStyle='#f88';ctx.fillRect(ai.x-ai.w/2,ai.y-ai.h/2,ai.w,ai.h);
  // 공
  ctx.fillStyle='#fff';ctx.shadowColor='#fff';ctx.shadowBlur=12;
  ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,6.28);ctx.fill();ctx.shadowBlur=0;
}
function end(){
  running=false;
  const win=scoreP>scoreA;
  beep(win?660:120,0.4,win?'square':'sawtooth');
  ov.style.display='flex';
  panel.innerHTML=`<h1 style="color:${win?'#6f8':'#f66'};text-shadow:0 0 12px ${win?'#0f6':'#f00'};">${win?'YOU WIN!':'YOU LOSE'}</h1>
    <div style="font-size:26px;margin:18px;">${scoreP} : ${scoreA}</div>
    <button class="btn" onclick="location.reload()">다시 (RETRY)</button>
    <div class="hint blink">또는 ← 메뉴로</div>`;
}
let actx;function beep(f,d,t='square',v=0.05){try{if(!actx)actx=new(window.AudioContext||webkitAudioContext)();const o=actx.createOscillator(),g=actx.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;o.connect(g);g.connect(actx.destination);o.start();g.gain.exponentialRampToValueAtTime(.0001,actx.currentTime+d);o.stop(actx.currentTime+d);}catch(e){}}
function menu(){
  ov.style.display='flex';
  panel.innerHTML=`<h1>PONG</h1>
    <div style="color:#7dd;letter-spacing:3px;margin:14px 0;">난이도 선택 · 7점 선승</div>
    <button class="btn" onclick="start({bspeed:5,ph:100,aispeed:4})">하 EASY<small>느린 CPU</small></button>
    <button class="btn" onclick="start({bspeed:6.5,ph:80,aispeed:6})">중 NORMAL<small>표준 CPU</small></button>
    <button class="btn" onclick="start({bspeed:8,ph:64,aispeed:8.5})">상 HARD<small>빠른 CPU</small></button>
    <div class="hint">↑ ↓ 또는 마우스 : 패들 이동<br>CPU와 대결! 먼저 7점을 내세요.</div>`;
}
menu();
</script>
</body>
</html>
